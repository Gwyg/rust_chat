<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            width: 380px;
        }
        h2 {
            text-align: center;
            margin-bottom: 8px;
            color: #1a1a2e;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #6c63ff;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #6c63ff;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-primary:hover {
            background: #5a52d5;
        }
        .btn-primary:disabled {
            background: #b0aac8;
            cursor: not-allowed;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            min-height: 20px;
        }
        .link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
        .link a {
            color: #6c63ff;
            text-decoration: none;
            font-weight: 500;
        }
        .link a:hover {
            text-decoration: underline;
        }
        .rules {
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>📝 注册</h2>
        <p class="subtitle">创建一个新账号</p>
        <form id="register-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="username">用户名</label>
                <input id="username" type="text" placeholder="请输入用户名" required minlength="2" maxlength="20" autocomplete="username" />
                <p class="rules">2-20 个字符</p>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input id="password" type="password" placeholder="请设置密码" required minlength="6" autocomplete="new-password" />
                <p class="rules">至少 6 个字符</p>
            </div>
            <div class="form-group">
                <label for="password-confirm">确认密码</label>
                <input id="password-confirm" type="password" placeholder="请再次输入密码" required minlength="6" autocomplete="new-password" />
            </div>
            <button class="btn-primary" id="submit-btn" type="submit">注 册</button>
            <p class="error-msg" id="error-msg"></p>
        </form>
        <div class="link">
            已有账号？<a href="/login">去登录</a>
        </div>
    </div>

    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            errorMsg.textContent = '';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('password-confirm').value;

            if (password !== confirm) {
                errorMsg.textContent = '两次输入的密码不一致';
                return;
            }

            btn.disabled = true;
            btn.textContent = '注册中...';

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                const data = await res.json();

                if (!res.ok) {
                    errorMsg.textContent = data.error || '注册失败';
                    btn.disabled = false;
                    btn.textContent = '注 册';
                    return;
                }

                // 注册成功，设置 Cookie 并直接进入聊天
                document.cookie = `chat_token=${data.token}; path=/; max-age=2592000`;
                window.location.href = '/';
            } catch (err) {
                errorMsg.textContent = '网络错误，请稍后重试';
                btn.disabled = false;
                btn.textContent = '注 册';
            }
        }
    </script>
</body>
</html>
