<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── 主布局 ── */
        #app {
            display: flex;
            width: 980px;
            max-width: 100vw;
            height: 92vh;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.12);
            overflow: hidden;
        }

        /* ── 侧边栏 ── */
        .sidebar {
            width: 270px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ececec;
            background: #fafafa;
        }
        .sidebar-me {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #ececec;
            background: #fff;
        }
        .me-avatar {
            width: 38px; height: 38px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700; color: #fff; flex-shrink: 0;
        }
        .me-name {
            font-size: 14px; font-weight: 600; color: #1a1a2e;
            flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .logout-btn {
            font-size: 12px; color: #aaa; cursor: pointer;
            padding: 4px 8px; border-radius: 6px;
            border: 1px solid #e8e8e8; background: #fff; transition: all .2s;
        }
        .logout-btn:hover { color: #e74c3c; border-color: #e74c3c; }

        /* Tab */
        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid #ececec;
            flex-wrap: wrap;
        }
        .tab-btn {
            flex: 1; padding: 9px 0; font-size: 12px; font-weight: 500;
            color: #888; background: none; border: none; cursor: pointer;
            border-bottom: 2px solid transparent; transition: all .2s;
            position: relative; min-width: 50px;
        }
        .tab-btn.active { color: #6c63ff; border-bottom-color: #6c63ff; }
        .tab-badge {
            position: absolute; top: 5px; right: 6px;
            background: #e74c3c; color: #fff;
            font-size: 10px; font-weight: 700;
            border-radius: 8px; padding: 1px 5px; min-width: 16px; text-align: center;
        }

        /* 列表 */
        .sidebar-list { flex: 1; overflow-y: auto; }
        .sidebar-list::-webkit-scrollbar { width: 4px; }
        .sidebar-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

        .list-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; cursor: pointer;
            transition: background .15s;
            border-bottom: 1px solid #f0f0f0;
        }
        .list-item:hover { background: #f3f1ff; }
        .list-item.active { background: #edeaff; }

        .list-avatar {
            width: 40px; height: 40px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700; color: #fff; flex-shrink: 0;
            overflow: hidden;
        }
        .list-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .list-info { flex: 1; overflow: hidden; }
        .list-name {
            font-size: 14px; font-weight: 500; color: #1a1a2e;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .list-preview {
            font-size: 12px; color: #aaa; margin-top: 2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .list-action { display: flex; gap: 5px; flex-shrink: 0; }
        .btn-sm {
            font-size: 11px; padding: 3px 8px; border-radius: 5px;
            border: none; cursor: pointer; font-weight: 500; transition: all .15s;
        }
        .btn-accept { background: #6c63ff; color: #fff; }
        .btn-accept:hover { background: #5a52d5; }
        .btn-reject { background: #f0f0f0; color: #888; }
        .btn-reject:hover { background: #e0e0e0; }
        .btn-del { background: #fff0f0; color: #e74c3c; border: 1px solid #fdd; }
        .btn-del:hover { background: #ffe0e0; }
        .btn-add { background: #f0eeff; color: #6c63ff; border: 1px solid #d8d4ff; }
        .btn-add:hover { background: #e0dbff; }
        .btn-manage { background: #f0f8ff; color: #2196f3; border: 1px solid #b3d9ff; }
        .btn-manage:hover { background: #ddefff; }

        .list-empty { padding: 32px 16px; text-align: center; color: #bbb; font-size: 13px; }

        /* 搜索框 */
        .search-box { padding: 10px 14px; border-bottom: 1px solid #ececec; }
        .search-box input {
            width: 100%; padding: 7px 12px;
            border: 1.5px solid #e8e8e8; border-radius: 20px;
            font-size: 13px; outline: none; transition: border-color .2s;
        }
        .search-box input:focus { border-color: #6c63ff; }

        /* 工具栏（群组 tab 用） */
        .sidebar-toolbar {
            padding: 8px 14px;
            border-bottom: 1px solid #ececec;
            display: flex; gap: 8px;
        }
        .toolbar-btn {
            flex: 1; padding: 6px 0; font-size: 12px; font-weight: 500;
            border-radius: 6px; border: 1.5px solid #d8d4ff;
            background: #f0eeff; color: #6c63ff; cursor: pointer; transition: all .15s;
        }
        .toolbar-btn:hover { background: #e0dbff; }

        /* ── 聊天区 ── */
        .chat-area {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-welcome {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: #bbb; gap: 12px;
        }
        .chat-welcome .welcome-icon { font-size: 48px; }
        .chat-welcome p { font-size: 14px; }

        .chat-header {
            padding: 12px 20px; background: #fff;
            border-bottom: 1px solid #ececec;
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .chat-title { font-size: 16px; font-weight: 600; color: #1a1a2e; }
        .chat-subtitle { font-size: 12px; color: #aaa; margin-top: 2px; }
        .chat-header-actions { display: flex; gap: 8px; align-items: center; }
        .chat-badge {
            font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500;
        }
        .chat-badge.group { background: #e8f4ff; color: #2196f3; }
        .chat-badge.private { background: #f0eeff; color: #6c63ff; }
        .chat-badge.mygroup { background: #e8fff3; color: #27ae60; }
        .header-icon-btn {
            width: 30px; height: 30px; border-radius: 8px;
            border: 1px solid #e8e8e8; background: #fff;
            cursor: pointer; font-size: 16px; display: flex;
            align-items: center; justify-content: center; transition: all .2s;
        }
        .header-icon-btn:hover { background: #f0eeff; border-color: #6c63ff; }

        .messages {
            flex: 1; overflow-y: auto; padding: 16px 20px;
            display: flex; flex-direction: column; gap: 14px;
            background: #f7f7f8;
        }
        .messages::-webkit-scrollbar { width: 5px; }
        .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

        .msg-row { display: flex; align-items: flex-start; gap: 10px; }
        .msg-row.self { flex-direction: row-reverse; }
        .msg-avatar {
            width: 36px; height: 36px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
        }
        .msg-body {
            display: flex; flex-direction: column; gap: 3px; max-width: 62%;
        }
        .msg-row.self .msg-body { align-items: flex-end; }
        .msg-row.other .msg-body { align-items: flex-start; }
        .msg-username { font-size: 11px; color: #aaa; padding: 0 4px; }
        .bubble {
            padding: 9px 13px; border-radius: 10px;
            font-size: 14px; line-height: 1.6; word-break: break-word;
        }
        .msg-row.other .bubble {
            background: #fff; color: #1a1a2e;
            border-top-left-radius: 2px; box-shadow: 0 1px 3px rgba(0,0,0,.07);
        }
        .msg-row.self .bubble {
            background: #6c63ff; color: #fff; border-top-right-radius: 2px;
        }
        .msg-time { font-size: 10px; color: #ccc; padding: 0 4px; }
        .msg-system {
            align-self: center; font-size: 11px; color: #bbb;
            background: rgba(0,0,0,.04); padding: 3px 12px; border-radius: 8px;
        }
        .msg-error {
            align-self: center; font-size: 12px; color: #e74c3c;
            background: #fff0f0; border: 1px solid #fdd; padding: 5px 12px; border-radius: 8px;
        }

        .input-area {
            padding: 12px 16px; border-top: 1px solid #ececec;
            display: flex; gap: 10px; background: #fff; flex-shrink: 0;
        }
        .input-area input {
            flex: 1; padding: 10px 16px; border: 2px solid #e8e8e8;
            border-radius: 24px; font-size: 14px; outline: none; transition: border-color .2s;
        }
        .input-area input:focus { border-color: #6c63ff; }
        .input-area button {
            padding: 10px 22px; background: #6c63ff; color: #fff;
            border: none; border-radius: 24px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background .2s;
        }
        .input-area button:hover { background: #5a52d5; }

        /* 文件按钮 */
        .file-btn {
            padding: 10px 14px; background: #f0eeff; color: #6c63ff;
            border: 2px solid #d8d4ff; border-radius: 24px; font-size: 18px;
            cursor: pointer; transition: all .2s; line-height: 1;
        }
        .file-btn:hover { background: #e0dbff; border-color: #6c63ff; }

        /* 文件消息卡片 */
        .file-card {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; border-radius: 10px;
            background: rgba(255,255,255,0.15); cursor: pointer;
            min-width: 180px; max-width: 260px; transition: background .15s;
        }
        .msg-row.other .file-card { background: rgba(108,99,255,0.08); }
        .file-card:hover { background: rgba(255,255,255,0.25); }
        .file-icon { font-size: 28px; flex-shrink: 0; }
        .file-info { flex: 1; overflow: hidden; }
        .file-name {
            font-size: 13px; font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .file-size { font-size: 11px; opacity: 0.7; margin-top: 2px; }
        .file-download { font-size: 11px; opacity: 0.6; }

        /* 图片消息 */
        .msg-image {
            max-width: 280px; max-height: 280px; border-radius: 10px;
            cursor: pointer; object-fit: cover; transition: opacity .15s;
        }
        .msg-image:hover { opacity: 0.85; }

        /* 图片预览遮罩 */
        .img-preview-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; cursor: pointer; opacity: 0; pointer-events: none;
            transition: opacity .2s;
        }
        .img-preview-overlay.show { opacity: 1; pointer-events: all; }
        .img-preview-overlay img {
            max-width: 90vw; max-height: 90vh; border-radius: 8px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }

        /* ── 群管理面板（右侧抽屉） ── */
        .group-panel {
            width: 0; flex-shrink: 0; overflow: hidden;
            border-left: 1px solid #ececec;
            transition: width .25s ease;
            display: flex; flex-direction: column;
            background: #fff;
        }
        .group-panel.open { width: 240px; }
        .panel-header {
            padding: 14px 16px; font-size: 14px; font-weight: 600;
            border-bottom: 1px solid #ececec; display: flex;
            align-items: center; justify-content: space-between;
        }
        .panel-close { cursor: pointer; color: #aaa; font-size: 18px; line-height: 1; }
        .panel-close:hover { color: #e74c3c; }
        .panel-body { flex: 1; overflow-y: auto; padding: 12px; }
        .panel-section { margin-bottom: 16px; }
        .panel-section-title {
            font-size: 11px; color: #aaa; font-weight: 600;
            text-transform: uppercase; letter-spacing: .5px;
            margin-bottom: 8px; padding-bottom: 4px;
            border-bottom: 1px solid #f0f0f0;
        }
        .panel-notice {
            font-size: 12px; color: #555; line-height: 1.6;
            background: #fffbe6; border: 1px solid #ffe58f;
            border-radius: 6px; padding: 8px 10px;
            min-height: 40px;
        }
        .panel-notice.empty { color: #bbb; font-style: italic; }
        .panel-input {
            width: 100%; padding: 7px 10px;
            border: 1.5px solid #e8e8e8; border-radius: 8px;
            font-size: 13px; outline: none; resize: none;
            transition: border-color .2s; font-family: inherit;
        }
        .panel-input:focus { border-color: #6c63ff; }
        .panel-btn {
            width: 100%; margin-top: 6px; padding: 7px 0;
            border-radius: 8px; border: none; cursor: pointer;
            font-size: 13px; font-weight: 500; transition: all .15s;
        }
        .panel-btn.primary { background: #6c63ff; color: #fff; }
        .panel-btn.primary:hover { background: #5a52d5; }
        .panel-btn.danger { background: #fff0f0; color: #e74c3c; border: 1px solid #fdd; }
        .panel-btn.danger:hover { background: #ffe0e0; }
        .panel-btn.secondary { background: #f0f0f0; color: #555; }
        .panel-btn.secondary:hover { background: #e0e0e0; }

        .member-row {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 0; border-bottom: 1px solid #f5f5f5;
        }
        .member-row:last-child { border-bottom: none; }
        .member-av {
            width: 28px; height: 28px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
        }
        .member-name { flex: 1; font-size: 13px; color: #333;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .member-role {
            font-size: 10px; padding: 1px 5px; border-radius: 4px; font-weight: 500;
        }
        .role-owner { background: #fff3e0; color: #e65100; }
        .role-admin { background: #e8f4ff; color: #1565c0; }
        .role-member { background: #f5f5f5; color: #888; }
        .member-kick {
            font-size: 11px; color: #ccc; cursor: pointer; padding: 2px 4px;
            border-radius: 4px; transition: all .15s;
        }
        .member-kick:hover { color: #e74c3c; background: #fff0f0; }

        /* ── 模달框 ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.45);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity .2s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: all; }
        .modal {
            background: #fff; border-radius: 16px; padding: 28px;
            width: 360px; max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,.2);
            transform: translateY(20px); transition: transform .2s;
        }
        .modal-overlay.show .modal { transform: translateY(0); }
        .modal-title { font-size: 17px; font-weight: 700; color: #1a1a2e; margin-bottom: 18px; }
        .modal-field { margin-bottom: 14px; }
        .modal-field label { font-size: 12px; color: #888; display: block; margin-bottom: 5px; }
        .modal-field input, .modal-field select {
            width: 100%; padding: 9px 12px;
            border: 1.5px solid #e8e8e8; border-radius: 8px;
            font-size: 14px; outline: none; transition: border-color .2s;
        }
        .modal-field input:focus, .modal-field select:focus { border-color: #6c63ff; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-actions button {
            flex: 1; padding: 10px 0; border-radius: 10px;
            border: none; font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all .15s;
        }
        .btn-confirm { background: #6c63ff; color: #fff; }
        .btn-confirm:hover { background: #5a52d5; }
        .btn-cancel { background: #f0f0f0; color: #555; }
        .btn-cancel:hover { background: #e0e0e0; }

        /* 头像预览 */
        .avatar-preview {
            width: 64px; height: 64px; border-radius: 12px;
            background: #f0f0f0; display: flex; align-items: center;
            justify-content: center; margin: 0 auto 12px;
            font-size: 28px; overflow: hidden; border: 2px solid #e8e8e8;
        }
        .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }

        @media (max-width: 640px) {
            #app { width: 100vw; height: 100vh; border-radius: 0; }
            .sidebar { width: 220px; }
            .group-panel.open { width: 200px; }
        }
        @media (max-width: 480px) { .sidebar { display: none; } }
    </style>
</head>
<body>
<div id="app">
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-me">
            <div class="me-avatar" id="me-avatar"></div>
            <div class="me-name" id="me-name">加载中...</div>
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
        <div class="sidebar-tabs">
            <button class="tab-btn active" onclick="switchTab('mygroups')" id="tab-mygroups">群组</button>
            <button class="tab-btn" onclick="switchTab('friends')" id="tab-friends">
                好友
                <span class="tab-badge" id="friend-badge" style="display:none"></span>
            </button>
            <button class="tab-btn" onclick="switchTab('users')" id="tab-users">找人</button>
        </div>
        <div id="search-area" style="display:none" class="search-box">
            <input id="search-input" placeholder="搜索用户名..." oninput="onSearch()" />
        </div>
        <div id="mygroups-toolbar" style="display:none" class="sidebar-toolbar">
            <button class="toolbar-btn" onclick="openCreateGroupModal()">＋ 创建群组</button>
        </div>
        <div class="sidebar-list" id="sidebar-list"></div>
    </div>

    <!-- 聊天区 -->
    <div class="chat-area" id="chat-area">
        <div class="chat-welcome" id="chat-welcome">
            <div class="welcome-icon">💬</div>
            <p>选择群组或好友开始聊天</p>
        </div>
        <div id="chat-main" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
            <div class="chat-header">
                <div>
                    <div class="chat-title" id="chat-title"></div>
                    <div class="chat-subtitle" id="chat-subtitle"></div>
                </div>
                <div class="chat-header-actions">
                    <span class="chat-badge" id="chat-badge"></span>
                    <!-- 群管理按钮，仅自建群显示 -->
                    <button class="header-icon-btn" id="btn-panel" style="display:none"
                            onclick="toggleGroupPanel()" title="群组管理">⚙️</button>
                </div>
            </div>
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <button class="file-btn" onclick="document.getElementById('file-input').click()" title="发送文件/图片">📎</button>
                <input id="file-input" type="file" style="display:none" onchange="handleFileSelect(event)" />
                <input id="msg-input" placeholder="输入消息..." maxlength="500" />
                <button onclick="send()">发送</button>
            </div>
        </div>
    </div>

    <!-- 图片预览遮罩 -->
    <div class="img-preview-overlay" id="img-preview" onclick="this.classList.remove('show')">
        <img id="img-preview-src" src="" />
    </div>

    <!-- 群管理面板 -->
    <div class="group-panel" id="group-panel">
        <div class="panel-header">
            <span>群组管理</span>
            <span class="panel-close" onclick="toggleGroupPanel()">×</span>
        </div>
        <div class="panel-body" id="panel-body">
            <!-- 动态渲染 -->
        </div>
    </div>
</div>

<!-- 创建群组 Modal -->
<div class="modal-overlay" id="modal-create">
    <div class="modal">
        <div class="modal-title">创建群组</div>
        <div class="modal-field">
            <label>群组名称</label>
            <input id="input-group-name" placeholder="给群组起个名字..." maxlength="30" />
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('modal-create')">取消</button>
            <button class="btn-confirm" onclick="confirmCreateGroup()">创建</button>
        </div>
    </div>
</div>

<!-- 加人 Modal -->
<div class="modal-overlay" id="modal-add-member">
    <div class="modal">
        <div class="modal-title">邀请成员</div>
        <div class="modal-field">
            <label>选择用户</label>
            <select id="select-add-user"></select>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('modal-add-member')">取消</button>
            <button class="btn-confirm" onclick="confirmAddMember()">邀请</button>
        </div>
    </div>
</div>

<!-- 修改公告 Modal -->
<div class="modal-overlay" id="modal-notice">
    <div class="modal">
        <div class="modal-title">修改群公告</div>
        <div class="modal-field">
            <textarea id="input-notice" class="panel-input" rows="4" placeholder="输入群公告内容..."></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('modal-notice')">取消</button>
            <button class="btn-confirm" onclick="confirmUpdateNotice()">保存</button>
        </div>
    </div>
</div>

<!-- 修改头像 Modal -->
<div class="modal-overlay" id="modal-avatar">
    <div class="modal">
        <div class="modal-title">修改群头像</div>
        <div class="avatar-preview" id="avatar-preview-box">🏠</div>
        <div class="modal-field">
            <label>图片 URL（留空则使用默认图标）</label>
            <input id="input-avatar-url" placeholder="https://..." oninput="previewAvatar()" />
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('modal-avatar')">取消</button>
            <button class="btn-confirm" onclick="confirmUpdateAvatar()">保存</button>
        </div>
    </div>
</div>

<script>
// ── 状态 ──────────────────────────────────────────────
let ws = null;
let myUsername = '';
let myToken = '';
let currentSession = null;   // { type:'group'|'private'|'mygroup', id, name }
let currentTab = 'groups';
let membersTimer = null;
let panelOpen = false;

let allUsers = [];
let friends = [];
let myGroups = [];           // 用户自建/加入的群组列表
let currentGroupDetail = null; // 当前打开群的详情（含成员）
let searchQuery = '';



const COLORS = ['#f4693b','#e91e8c','#9c27b0','#3f51b5','#2196f3','#00bcd4','#009688','#4caf50','#ff9800','#795548'];
function avatarColor(n) {
    let h = 0; for (const c of n) h = (h*31 + c.charCodeAt(0)) & 0xffffffff;
    return COLORS[Math.abs(h) % COLORS.length];
}
function avatarLetter(n) { return n.charAt(0).toUpperCase(); }
function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function fmtTime(d) { return d.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' }); }
function getCookie(n) { const m = document.cookie.match(new RegExp('(^| )'+n+'=([^;]+)')); return m?m[2]:null; }

// ── 初始化 ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
    myToken = getCookie('chat_token');
    if (!myToken) { location.href = '/login'; return; }
    try {
        const p = JSON.parse(atob(myToken.split('.')[1]));
        myUsername = p.username;
    } catch { location.href = '/login'; return; }

    const av = document.getElementById('me-avatar');
    av.style.background = avatarColor(myUsername);
    av.textContent = avatarLetter(myUsername);
    document.getElementById('me-name').textContent = myUsername;

    await Promise.all([loadUsers(), loadFriends(), loadMyGroups()]);
    connectWS();
    switchTab('mygroups');

    setInterval(async () => {
        await loadFriends();
        if (currentTab === 'friends') renderSidebar();
        updateFriendBadge();
    }, 30000);

    setInterval(async () => {
        await loadMyGroups();
        if (currentTab === 'mygroups') renderSidebar();
    }, 30000);

    document.getElementById('msg-input').addEventListener('keypress', e => {
        if (e.key === 'Enter') send();
    });
});

// ── 数据加载 ────────────────────────────────────────────
async function loadUsers() {
    try { const r = await fetch('/api/users'); if (r.ok) allUsers = await r.json(); } catch {}
}
async function loadFriends() {
    try {
        const r = await fetch('/api/friends');
        if (r.ok) friends = await r.json();
    } catch {}
    updateFriendBadge();
}
async function loadMyGroups() {
    try {
        const r = await fetch('/api/groups');
        if (r.ok) myGroups = await r.json();
    } catch {}
}
function updateFriendBadge() {
    const pending = friends.filter(f => f.status === 'pending_recv').length;
    const badge = document.getElementById('friend-badge');
    if (pending > 0) { badge.textContent = pending; badge.style.display = ''; }
    else badge.style.display = 'none';
}

// ── WebSocket ───────────────────────────────────────────
function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws?token=${myToken}`);
    ws.onopen = () => {
        // 有当前会话则重连时自动回到原群，否则不预设房间
        if (currentSession?.id) {
            ws.send(JSON.stringify({ msg_type:'message', username:myUsername, room:currentSession.id, content:'' }));
        }
    };
    ws.onmessage = e => handleIncoming(JSON.parse(e.data));
    ws.onclose = () => { setTimeout(connectWS, 3000); };
    ws.onerror = () => ws.close();
}

function handleIncoming(msg) {
    const t = msg.type;
    if (t === 'error') { appendErrMsg(msg.content); return; }
    if (t === 'history') { appendChatMsg(msg.username, msg.content); return; }
    if (t === 'file') {
        const isImage = msg.mime_type && msg.mime_type.startsWith('image/');
        if (isImage) {
            appendImageMsg(msg.username, msg.file_id, msg.filename || '图片', true);
        } else {
            appendFileMsg(msg.username, msg.file_id, msg.filename || '文件', true);
        }
        return;
    }
    if (t === 'private') {
        if (currentSession?.type === 'private' && currentSession.id === msg.username) {
            appendChatMsg(msg.username, msg.content);
        }
        return;
    }
    if (msg.username === '系统') { appendSysMsg(msg.content); updateOnlineCount(); return; }
    appendChatMsg(msg.username, msg.content);
}

// ── Tab 切换 ────────────────────────────────────────────
function switchTab(tab) {
    currentTab = tab;
    ['mygroups','friends','users'].forEach(t => {
        const el = document.getElementById('tab-'+t);
        if (el) el.classList.toggle('active', t === tab);
    });
    document.getElementById('search-area').style.display = tab === 'users' ? '' : 'none';
    document.getElementById('mygroups-toolbar').style.display = tab === 'mygroups' ? '' : 'none';
    if (tab === 'users') document.getElementById('search-input').focus();
    searchQuery = '';
    const si = document.getElementById('search-input');
    if (si) si.value = '';
    renderSidebar();
}

function onSearch() {
    searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
    renderSidebar();
}

// ── 渲染侧边栏 ──────────────────────────────────────────
function renderSidebar() {
    const list = document.getElementById('sidebar-list');
    list.innerHTML = '';
    if (currentTab === 'mygroups') renderMyGroups(list);
    else if (currentTab === 'friends') renderFriends(list);
    else renderUsers(list);
}

function renderMyGroups(list) {
    if (myGroups.length === 0) {
        list.innerHTML = '<div class="list-empty">还没有群组，点击上方「创建群组」</div>';
        return;
    }
    myGroups.forEach(g => {
        const item = makeItem();
        if (currentSession?.id === g.group_id && currentSession?.type === 'mygroup') item.classList.add('active');
        item.onclick = () => openMyGroup(g);

        // 头像
        const av = document.createElement('div');
        av.className = 'list-avatar';
        if (g.avatar) {
            const img = document.createElement('img');
            img.src = g.avatar;
            img.onerror = () => { av.textContent = avatarLetter(g.name); };
            av.appendChild(img);
        } else {
            av.style.background = avatarColor(g.group_id);
            av.textContent = avatarLetter(g.name);
        }

        const info = makeInfo(g.name, `${g.member_count} 人 · ${g.role === 'owner' ? '群主' : g.role === 'admin' ? '管理员' : '成员'}`);

        const actions = document.createElement('div');
        actions.className = 'list-action';
        const btnM = document.createElement('button');
        btnM.className = 'btn-sm btn-manage';
        btnM.textContent = '管理';
        btnM.onclick = e => { e.stopPropagation(); openMyGroup(g, true); };
        actions.append(btnM);

        item.append(av, info, actions);
        list.appendChild(item);
    });
}

function renderFriends(list) {
    const pending = friends.filter(f => f.status === 'pending_recv');
    const accepted = friends.filter(f => f.status === 'accepted');
    const sent = friends.filter(f => f.status === 'pending_send');

    if (pending.length === 0 && accepted.length === 0 && sent.length === 0) {
        list.innerHTML = '<div class="list-empty">暂无好友，去「找人」添加吧</div>';
        return;
    }

    pending.forEach(f => {
        const item = makeItem();
        const av = makeAvatar(f.username);
        const info = makeInfo(f.username, '请求添加你为好友');
        const actions = document.createElement('div');
        actions.className = 'list-action';
        const btnA = document.createElement('button');
        btnA.className = 'btn-sm btn-accept'; btnA.textContent = '接受';
        btnA.onclick = e => { e.stopPropagation(); acceptFriend(f.username); };
        const btnR = document.createElement('button');
        btnR.className = 'btn-sm btn-reject'; btnR.textContent = '拒绝';
        btnR.onclick = e => { e.stopPropagation(); deleteFriend(f.username); };
        actions.append(btnA, btnR);
        item.append(av, info, actions);
        list.appendChild(item);
    });

    accepted.forEach(f => {
        const item = makeItem();
        if (currentSession?.id === f.username && currentSession?.type === 'private') item.classList.add('active');
        item.onclick = () => openPrivate(f.username);
        const av = makeAvatar(f.username);
        const info = makeInfo(f.username, '点击私聊');
        const actions = document.createElement('div');
        actions.className = 'list-action';
        const btnD = document.createElement('button');
        btnD.className = 'btn-sm btn-del'; btnD.textContent = '删除';
        btnD.onclick = e => { e.stopPropagation(); deleteFriend(f.username); };
        actions.append(btnD);
        item.append(av, info, actions);
        list.appendChild(item);
    });

    sent.forEach(f => {
        const item = makeItem();
        item.style.opacity = '0.7';
        const av = makeAvatar(f.username);
        const info = makeInfo(f.username, '等待对方接受');
        const actions = document.createElement('div');
        actions.className = 'list-action';
        const btnC = document.createElement('button');
        btnC.className = 'btn-sm btn-reject'; btnC.textContent = '撤回';
        btnC.onclick = e => { e.stopPropagation(); deleteFriend(f.username); };
        actions.append(btnC);
        item.append(av, info, actions);
        list.appendChild(item);
    });
}

function renderUsers(list) {
    let users = allUsers.filter(u => u !== myUsername);
    if (searchQuery) users = users.filter(u => u.toLowerCase().includes(searchQuery));
    if (users.length === 0) { list.innerHTML = '<div class="list-empty">没有找到用户</div>'; return; }

    users.forEach(u => {
        const item = makeItem();
        const av = makeAvatar(u);
        const f = friends.find(f => f.username === u);
        let preview = '点击添加好友';
        if (f?.status === 'accepted') preview = '已是好友';
        else if (f?.status === 'pending_send') preview = '申请已发送';
        else if (f?.status === 'pending_recv') preview = '对方申请中';
        const info = makeInfo(u, preview);
        const actions = document.createElement('div');
        actions.className = 'list-action';
        if (!f) {
            const btn = document.createElement('button');
            btn.className = 'btn-sm btn-add'; btn.textContent = '加好友';
            btn.onclick = e => { e.stopPropagation(); sendFriendRequest(u); };
            actions.append(btn);
        } else if (f.status === 'pending_recv') {
            const btn = document.createElement('button');
            btn.className = 'btn-sm btn-accept'; btn.textContent = '接受';
            btn.onclick = e => { e.stopPropagation(); acceptFriend(u); };
            actions.append(btn);
        }
        item.append(av, info, actions);
        list.appendChild(item);
    });
}

// ── 好友操作 ────────────────────────────────────────────
async function sendFriendRequest(target) {
    const r = await fetch('/api/friends/request', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target }),
    });
    if (r.ok) { await loadFriends(); renderSidebar(); }
}
async function acceptFriend(from) {
    const r = await fetch('/api/friends/accept', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target: from }),
    });
    if (r.ok) { await loadFriends(); renderSidebar(); }
}
async function deleteFriend(target) {
    const r = await fetch(`/api/friends/${encodeURIComponent(target)}`, { method: 'DELETE' });
    if (r.ok) { await loadFriends(); renderSidebar(); }
}

// ── 打开会话 ────────────────────────────────────────────
async function openMyGroup(g, openPanel = false) {
    currentSession = { type: 'mygroup', id: g.group_id, name: g.name };
    if (ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ msg_type:'message', username:myUsername, room:g.group_id, content:'' }));
    }
    clearMessages(); showChatMain();
    document.getElementById('chat-title').textContent = g.name;
    const badge = document.getElementById('chat-badge');
    badge.textContent = '自建群'; badge.className = 'chat-badge mygroup';
    document.getElementById('btn-panel').style.display = '';
    stopMembersTimer();
    startMembersTimer(g.group_id);
    renderSidebar();

    // 加载群详情
    await refreshGroupPanel(g.group_id);
    if (openPanel && !panelOpen) toggleGroupPanel();
}

async function openPrivate(username) {
    if (currentSession?.id === username && currentSession?.type === 'private') return;
    currentSession = { type: 'private', id: username, name: username };
    clearMessages(); showChatMain();
    document.getElementById('chat-title').textContent = username;
    document.getElementById('chat-subtitle').textContent = '私聊';
    const badge = document.getElementById('chat-badge');
    badge.textContent = '私聊'; badge.className = 'chat-badge private';
    document.getElementById('btn-panel').style.display = 'none';
    closeGroupPanel();
    stopMembersTimer();
    renderSidebar();
    try {
        const r = await fetch(`/api/private/${encodeURIComponent(username)}/history?username=${encodeURIComponent(myUsername)}`);
        if (r.ok) { const msgs = await r.json(); msgs.forEach(m => appendChatMsg(m.username, m.content)); }
    } catch {}
}

// ── 发消息 ──────────────────────────────────────────────
function send() {
    const input = document.getElementById('msg-input');
    const content = input.value.trim();
    if (!content || !ws || ws.readyState !== WebSocket.OPEN || !currentSession) return;

    if (currentSession.type === 'mygroup') {
        ws.send(JSON.stringify({ msg_type:'message', username:myUsername, room:currentSession.id, content }));
    } else {
        ws.send(JSON.stringify({ msg_type:'private', username:myUsername, room:currentSession.id, content }));
        appendChatMsg(myUsername, content);
    }
    input.value = '';
}

// ── 在线人数 ────────────────────────────────────────────
function startMembersTimer(room) {
    updateOnlineCount(room);
    membersTimer = setInterval(() => updateOnlineCount(room), 5000);
}
function stopMembersTimer() {
    clearInterval(membersTimer);
    document.getElementById('chat-subtitle').textContent = '';
}
async function updateOnlineCount(room) {
    room = room || (currentSession?.type !== 'private' ? currentSession?.id : null);
    if (!room) return;
    try {
        const r = await fetch(`/api/rooms/${encodeURIComponent(room)}/members`);
        if (r.ok && currentSession?.type !== 'private') {
            const m = await r.json();
            document.getElementById('chat-subtitle').textContent = `在线 ${m.length} 人`;
        }
    } catch {}
}

// ── 群管理面板 ──────────────────────────────────────────
function toggleGroupPanel() {
    panelOpen = !panelOpen;
    document.getElementById('group-panel').classList.toggle('open', panelOpen);
    if (panelOpen && currentSession?.type === 'mygroup') {
        refreshGroupPanel(currentSession.id);
    }
}
function closeGroupPanel() {
    panelOpen = false;
    document.getElementById('group-panel').classList.remove('open');
}

async function refreshGroupPanel(groupId) {
    try {
        const [gRes, mRes] = await Promise.all([
            fetch('/api/groups'),
            fetch(`/api/groups/${encodeURIComponent(groupId)}/members`),
        ]);
        if (gRes.ok) myGroups = await gRes.json();
        const members = mRes.ok ? await mRes.json() : [];
        currentGroupDetail = { ...(myGroups.find(g => g.group_id === groupId) || {}), members };
        renderGroupPanel();
    } catch {}
}

function renderGroupPanel() {
    const g = currentGroupDetail;
    if (!g) return;
    const isOwner = g.role === 'owner';
    const isAdmin = g.role === 'admin';
    const canManage = isOwner || isAdmin;

    const body = document.getElementById('panel-body');
    body.innerHTML = '';

    // ── 群公告 ──
    const noticeSection = document.createElement('div');
    noticeSection.className = 'panel-section';
    noticeSection.innerHTML = `<div class="panel-section-title">群公告</div>
        <div class="panel-notice ${g.notice ? '' : 'empty'}">${g.notice ? escapeHtml(g.notice) : '暂无公告'}</div>`;
    if (canManage) {
        const btn = document.createElement('button');
        btn.className = 'panel-btn secondary'; btn.textContent = '✏️ 修改公告';
        btn.onclick = () => openNoticeModal(g.notice || '');
        noticeSection.appendChild(btn);
    }
    body.appendChild(noticeSection);

    // ── 群头像（仅群主） ──
    if (isOwner) {
        const avatarSection = document.createElement('div');
        avatarSection.className = 'panel-section';
        avatarSection.innerHTML = `<div class="panel-section-title">群头像</div>`;
        const btn = document.createElement('button');
        btn.className = 'panel-btn secondary'; btn.textContent = '🖼️ 修改头像';
        btn.onclick = () => openAvatarModal(g.avatar || '');
        avatarSection.appendChild(btn);
        body.appendChild(avatarSection);
    }

    // ── 成员列表 ──
    const membersSection = document.createElement('div');
    membersSection.className = 'panel-section';
    membersSection.innerHTML = `<div class="panel-section-title">成员（${(g.members||[]).length}）</div>`;

    (g.members || []).forEach(m => {
        const row = document.createElement('div');
        row.className = 'member-row';

        const av = document.createElement('div');
        av.className = 'member-av';
        av.style.background = avatarColor(m.username);
        av.textContent = avatarLetter(m.username);

        const name = document.createElement('div');
        name.className = 'member-name';
        name.textContent = m.username;

        const roleBadge = document.createElement('span');
        roleBadge.className = `member-role role-${m.role}`;
        roleBadge.textContent = m.role === 'owner' ? '群主' : m.role === 'admin' ? '管理' : '成员';

        row.append(av, name, roleBadge);

        // 踢人按钮（不能踢自己/群主；管理员只能踢普通成员）
        if (m.username !== myUsername && m.role !== 'owner' && canManage) {
            if (isOwner || (isAdmin && m.role === 'member')) {
                const kick = document.createElement('span');
                kick.className = 'member-kick'; kick.textContent = '踢';
                kick.title = `踢出 ${m.username}`;
                kick.onclick = () => kickMember(g.group_id, m.username);
                row.appendChild(kick);
            }
        }
        membersSection.appendChild(row);
    });

    // 加人按钮
    if (canManage) {
        const addBtn = document.createElement('button');
        addBtn.className = 'panel-btn primary'; addBtn.textContent = '＋ 邀请成员';
        addBtn.style.marginTop = '8px';
        addBtn.onclick = () => openAddMemberModal(g.group_id, g.members || []);
        membersSection.appendChild(addBtn);
    }
    body.appendChild(membersSection);

    // ── 危险操作 ──
    const dangerSection = document.createElement('div');
    dangerSection.className = 'panel-section';
    dangerSection.innerHTML = `<div class="panel-section-title">操作</div>`;
    if (isOwner) {
        const btn = document.createElement('button');
        btn.className = 'panel-btn danger'; btn.textContent = '💣 解散群组';
        btn.onclick = () => dissolveGroup(g.group_id);
        dangerSection.appendChild(btn);
    }
    body.appendChild(dangerSection);
}

// ── 群组操作 ────────────────────────────────────────────
function openCreateGroupModal() {
    document.getElementById('input-group-name').value = '';
    openModal('modal-create');
    setTimeout(() => document.getElementById('input-group-name').focus(), 100);
}

async function confirmCreateGroup() {
    const name = document.getElementById('input-group-name').value.trim();
    if (!name) return;
    const r = await fetch('/api/groups', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name }),
    });
    if (r.ok) {
        closeModal('modal-create');
        await loadMyGroups();
        renderSidebar();
    } else {
        const err = await r.json();
        alert(err.error || '创建失败');
    }
}

function openAddMemberModal(groupId, currentMembers) {
    const currentUsernames = new Set(currentMembers.map(m => m.username));
    const candidates = allUsers.filter(u => !currentUsernames.has(u));
    const sel = document.getElementById('select-add-user');
    sel.innerHTML = '';
    if (candidates.length === 0) {
        alert('没有可邀请的用户了');
        return;
    }
    candidates.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u; opt.textContent = u;
        sel.appendChild(opt);
    });
    sel.dataset.groupId = groupId;
    openModal('modal-add-member');
}

async function confirmAddMember() {
    const sel = document.getElementById('select-add-user');
    const groupId = sel.dataset.groupId;
    const username = sel.value;
    if (!username || !groupId) return;
    const r = await fetch('/api/groups/members/add', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ group_id: groupId, username }),
    });
    if (r.ok) {
        closeModal('modal-add-member');
        await refreshGroupPanel(groupId);
        await loadMyGroups();
        renderSidebar();
    } else {
        const err = await r.json();
        alert(err.error || '邀请失败');
    }
}

async function kickMember(groupId, username) {
    if (!confirm(`确定踢出 ${username}？`)) return;
    const r = await fetch('/api/groups/members/remove', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ group_id: groupId, username }),
    });
    if (r.ok) {
        await refreshGroupPanel(groupId);
        await loadMyGroups();
        renderSidebar();
    } else {
        const err = await r.json();
        alert(err.error || '操作失败');
    }
}

function openNoticeModal(current) {
    document.getElementById('input-notice').value = current;
    openModal('modal-notice');
}

async function confirmUpdateNotice() {
    if (!currentGroupDetail) return;
    const notice = document.getElementById('input-notice').value.trim();
    const r = await fetch('/api/groups/notice', {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ group_id: currentGroupDetail.group_id, notice }),
    });
    if (r.ok) {
        closeModal('modal-notice');
        await refreshGroupPanel(currentGroupDetail.group_id);
    } else {
        const err = await r.json();
        alert(err.error || '更新失败');
    }
}

function openAvatarModal(current) {
    document.getElementById('input-avatar-url').value = current;
    previewAvatar();
    openModal('modal-avatar');
}

function previewAvatar() {
    const url = document.getElementById('input-avatar-url').value.trim();
    const box = document.getElementById('avatar-preview-box');
    if (url) {
        box.innerHTML = `<img src="${escapeHtml(url)}" onerror="this.parentElement.textContent='🏠'" />`;
    } else {
        box.textContent = '🏠';
    }
}

async function confirmUpdateAvatar() {
    if (!currentGroupDetail) return;
    const avatar = document.getElementById('input-avatar-url').value.trim();
    const r = await fetch('/api/groups/avatar', {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ group_id: currentGroupDetail.group_id, avatar }),
    });
    if (r.ok) {
        closeModal('modal-avatar');
        await loadMyGroups();
        await refreshGroupPanel(currentGroupDetail.group_id);
        renderSidebar();
    } else {
        const err = await r.json();
        alert(err.error || '更新失败');
    }
}

async function dissolveGroup(groupId) {
    if (!confirm('确定解散群组？此操作不可恢复！')) return;
    const r = await fetch(`/api/groups/${encodeURIComponent(groupId)}`, { method: 'DELETE' });
    if (r.ok) {
        closeGroupPanel();
        currentSession = null;
        document.getElementById('chat-welcome').style.display = '';
        document.getElementById('chat-main').style.display = 'none';
        document.getElementById('btn-panel').style.display = 'none';
        await loadMyGroups();
        switchTab('mygroups');
    } else {
        const err = await r.json();
        alert(err.error || '解散失败');
    }
}

// ── 文件/图片传输 ─────────────────────────────────────
async function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file || !currentSession) return;
    event.target.value = ''; // 重置 input

    const formData = new FormData();
    formData.append('file', file);

    try {
        const r = await fetch('/api/upload', {
            method: 'POST',
            body: formData,
        });
        if (!r.ok) {
            const err = await r.json();
            appendErrMsg('上传失败: ' + (err.error || '未知错误'));
            return;
        }
        const data = await r.json();
        const isImage = data.mime_type && data.mime_type.startsWith('image/');

        // 通过 WS 广播文件消息
        if (currentSession.type === 'mygroup') {
            ws.send(JSON.stringify({
                msg_type: 'file',
                username: myUsername,
                room: currentSession.id,
                content: data.filename,
                file_id: data.file_id,
                filename: data.filename,
                mime_type: data.mime_type,
            }));
        } else {
            ws.send(JSON.stringify({
                msg_type: 'file',
                username: myUsername,
                room: currentSession.id,
                content: data.filename,
                file_id: data.file_id,
                filename: data.filename,
                mime_type: data.mime_type,
            }));
            // 自己这边也显示
            if (isImage) {
                appendImageMsg(myUsername, data.file_id, data.filename, true);
            } else {
                appendFileMsg(myUsername, data.file_id, data.filename, true);
            }
        }
    } catch (e) {
        appendErrMsg('上传失败: ' + e.message);
    }
}

function appendFileMsg(username, fileId, filename, isReceived) {
    const c = document.getElementById('messages');
    if (!c) return;
    const isSelf = username === myUsername;
    const row = document.createElement('div');
    row.className = 'msg-row ' + (isSelf ? 'self' : 'other');

    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.style.background = avatarColor(username);
    av.textContent = avatarLetter(username);

    const body = document.createElement('div');
    body.className = 'msg-body';
    body.innerHTML = `
        ${!isSelf ? `<div class="msg-username">${escapeHtml(username)}</div>` : ''}
        <div class="bubble">
            <div class="file-card" onclick="downloadFile('${fileId}', '${escapeHtml(filename)}')">
                <div class="file-icon">📄</div>
                <div class="file-info">
                    <div class="file-name">${escapeHtml(filename)}</div>
                    <div class="file-download">点击下载</div>
                </div>
            </div>
        </div>
        <div class="msg-time">${fmtTime(new Date())}</div>
    `;
    row.append(av, body);
    c.appendChild(row);
    c.scrollTop = c.scrollHeight;
}

function appendImageMsg(username, fileId, filename, isReceived) {
    const c = document.getElementById('messages');
    if (!c) return;
    const isSelf = username === myUsername;
    const row = document.createElement('div');
    row.className = 'msg-row ' + (isSelf ? 'self' : 'other');

    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.style.background = avatarColor(username);
    av.textContent = avatarLetter(username);

    const body = document.createElement('div');
    body.className = 'msg-body';
    body.innerHTML = `
        ${!isSelf ? `<div class="msg-username">${escapeHtml(username)}</div>` : ''}
        <div class="bubble">
            <img class="msg-image" src="/api/download/${fileId}" alt="${escapeHtml(filename)}"
                 onclick="previewImage('/api/download/${fileId}')"
                 onerror="this.parentElement.innerHTML='<div class=\\'file-card\\' onclick=\\'downloadFile(\\'${fileId}\\', \\'${escapeHtml(filename)}\\')\\'><div class=\\'file-icon\\'>📄</div><div class=\\'file-info\\'><div class=\\'file-name\\'>${escapeHtml(filename)}</div><div class=\\'file-download\\'>点击下载</div></div></div>'" />
        </div>
        <div class="msg-time">${fmtTime(new Date())}</div>
    `;
    row.append(av, body);
    c.appendChild(row);
    c.scrollTop = c.scrollHeight;
}

function downloadFile(fileId, filename) {
    const a = document.createElement('a');
    a.href = '/api/download/' + fileId;
    a.download = filename;
    a.click();
}

function previewImage(src) {
    document.getElementById('img-preview-src').src = src;
    document.getElementById('img-preview').classList.add('show');
}

function logout() {
    document.cookie = 'chat_token=; max-age=0; path=/';
    location.href = '/login';
}
