<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* === 房间选择页 === */
        #room-picker {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 360px;
        }
        #room-picker h2 { margin-bottom: 8px; color: #1a1a2e; }
        #room-picker p { color: #888; font-size: 14px; margin-bottom: 24px; }
        .room-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .room-option {
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s;
            text-align: left;
        }
        .room-option:hover { border-color: #6c63ff; background: #f8f7ff; }
        .room-option.selected { border-color: #6c63ff; background: #f0eeff; }
        .room-option input { display: none; }
        .room-picker-btn {
            width: 100%;
            padding: 12px;
            background: #6c63ff;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .room-picker-btn:hover { background: #5a52d5; }
        .room-picker-btn:disabled { background: #b0aac8; cursor: not-allowed; }
        .picker-error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }

        /* === 聊天页 === */
        #chat-page {
            display: none;
            width: 560px;
            max-width: 100vw;
            height: 90vh;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶栏 */
        .chat-header {
            padding: 16px 20px;
            background: #6c63ff;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .chat-header .room-name { font-weight: 600; font-size: 17px; }
        .chat-header .online-count { font-size: 13px; opacity: 0.85; }
        .chat-header .leave-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .chat-header .leave-btn:hover { background: rgba(255,255,255,0.3); }

        /* 消息区 */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #f5f5f5;
        }
        #messages::-webkit-scrollbar { width: 5px; }
        #messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

        /* 消息行容器 */
        .msg-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .msg-row.self {
            flex-direction: row-reverse;
        }

        /* 头像 */
        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            user-select: none;
        }

        /* 消息主体（用户名 + 气泡） */
        .msg-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 65%;
        }
        .msg-row.self .msg-body { align-items: flex-end; }
        .msg-row.other .msg-body { align-items: flex-start; }

        /* 用户名 */
        .msg-username {
            font-size: 12px;
            color: #888;
            font-weight: 500;
            padding: 0 4px;
        }

        /* 气泡 */
        .bubble {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
            position: relative;
        }
        .msg-row.other .bubble {
            background: #fff;
            color: #1a1a2e;
            border-top-left-radius: 2px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }
        .msg-row.self .bubble {
            background: #6c63ff;
            color: #fff;
            border-top-right-radius: 2px;
        }

        /* 时间戳 */
        .msg-time {
            font-size: 11px;
            color: #bbb;
            padding: 0 4px;
        }

        /* 系统消息 */
        .msg-system {
            align-self: center;
            font-size: 12px;
            color: #aaa;
            background: rgba(0,0,0,0.05);
            padding: 4px 12px;
            border-radius: 10px;
            text-align: center;
        }

        /* 错误消息 */
        .msg-error {
            align-self: center;
            font-size: 13px;
            color: #e74c3c;
            background: #fff0f0;
            border: 1px solid #fdd;
            padding: 6px 14px;
            border-radius: 8px;
        }

        /* 输入区 */
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid #e8e8e8;
            display: flex;
            gap: 10px;
            background: #fff;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-area input:focus { border-color: #6c63ff; }
        .input-area button {
            padding: 10px 24px;
            background: #6c63ff;
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-area button:hover { background: #5a52d5; }

        /* 响应式 */
        @media (max-width: 540px) {
            #chat-page { width: 100vw; height: 100vh; border-radius: 0; }
            #room-picker { width: calc(100vw - 32px); }
        }
    </style>
</head>
<body>
    <!-- 房间选择页 -->
    <div id="room-picker">
        <h2>💬 选择聊天房间</h2>
        <p>选择一个房间开始聊天</p>
        <div class="room-options">
            <label class="room-option selected" onclick="selectRoom(this)">
                <input type="radio" name="room" value="Java群" checked />
                ☕ Java群
            </label>
            <label class="room-option" onclick="selectRoom(this)">
                <input type="radio" name="room" value="Rust群" />
                🦀 Rust群
            </label>
            <label class="room-option" onclick="selectRoom(this)">
                <input type="radio" name="room" value="闲聊" />
                🎯 闲聊
            </label>
        </div>
        <button class="room-picker-btn" onclick="enterRoom()">进入聊天</button>
        <div class="picker-error" id="picker-error"></div>
    </div>

    <!-- 聊天页 -->
    <div id="chat-page">
        <div class="chat-header">
            <div>
                <div class="room-name" id="room-title">房间</div>
                <div class="online-count" id="online-count">在线: 0</div>
            </div>
            <button class="leave-btn" onclick="leaveRoom()">退出</button>
        </div>
        <div id="messages"></div>
        <div class="input-area">
            <input id="msg" placeholder="输入消息..." maxlength="500" />
            <button onclick="send()">发送</button>
        </div>
    </div>

    <script>
        let ws;
        let myUsername;
        let myRoom;
        let membersInterval;

        // 工具函数：读取 Cookie
        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? match[2] : null;
        }

        // 根据用户名生成固定颜色头像
        const AVATAR_COLORS = [
            "#f4693b", "#e91e8c", "#9c27b0", "#3f51b5",
            "#2196f3", "#00bcd4", "#009688", "#4caf50",
            "#ff9800", "#795548"
        ];
        function getAvatarColor(name) {
            let hash = 0;
            for (let c of name) hash = (hash * 31 + c.charCodeAt(0)) & 0xffffffff;
            return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
        }
        function getAvatarLetter(name) {
            return name.charAt(0).toUpperCase();
        }

        function formatTime(date) {
            return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(text) {
            const d = document.createElement("div");
            d.textContent = text;
            return d.innerHTML;
        }

        function appendMessage(type, username, content) {
            const container = document.getElementById("messages");

            if (type === "error") {
                const div = document.createElement("div");
                div.className = "msg-error";
                div.textContent = "❌ " + content;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
                return;
            }

            if (type === "system") {
                const div = document.createElement("div");
                div.className = "msg-system";
                div.textContent = content;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
                return;
            }

            const isSelf = username === myUsername;
            const time = formatTime(new Date());
            const color = getAvatarColor(username);
            const letter = getAvatarLetter(username);

            const row = document.createElement("div");
            row.className = "msg-row " + (isSelf ? "self" : "other");

            row.innerHTML = `
                <div class="avatar" style="background:${color}">${letter}</div>
                <div class="msg-body">
                    ${!isSelf ? `<div class="msg-username">${escapeHtml(username)}</div>` : ""}
                    <div class="bubble">${escapeHtml(content)}</div>
                    <div class="msg-time">${time}</div>
                </div>
            `;

            container.appendChild(row);
            container.scrollTop = container.scrollHeight;
        }

        // 房间选择高亮
        function selectRoom(el) {
            document.querySelectorAll('.room-option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
        }

        // 轮询在线成员
        async function fetchMembers() {
            try {
                const res = await fetch(`/api/rooms/${encodeURIComponent(myRoom)}/members`);
                if (!res.ok) return;
                const members = await res.json();
                document.getElementById("online-count").textContent = `在线: ${members.length}`;
            } catch (e) {}
        }

        function startPollingMembers() {
            fetchMembers();
            membersInterval = setInterval(fetchMembers, 5000);
        }

        function stopPollingMembers() {
            clearInterval(membersInterval);
        }

        // 进入房间
        async function enterRoom() {
            const token = getCookie("chat_token");
            if (!token) {
                window.location.href = "/login";
                return;
            }

            const selected = document.querySelector('input[name="room"]:checked');
            myRoom = selected.value;

            // 从 token 中解析 username（JWT payload base64）
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                myUsername = payload.username;
            } catch (e) {
                showError("token 解析失败，请重新登录");
                return;
            }

            const errorDiv = document.getElementById("picker-error");
            errorDiv.style.display = "none";

            const protocol = location.protocol === "https:" ? "wss:" : "ws:";
            ws = new WebSocket(`${protocol}//${location.host}/ws?token=${token}`);

            ws.onopen = () => {
                // 发送加入房间消息（带 msg_type）
                ws.send(JSON.stringify({
                    msg_type: "message",
                    username: myUsername,
                    room: myRoom,
                    content: ""
                }));
            };

            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === "history") {
                    appendMessage("message", msg.username, msg.content);
                } else if (msg.type === "error") {
                    appendMessage("error", "", msg.content);
                } else if (msg.username === "系统") {
                    appendMessage("system", "", msg.content);
                    setTimeout(fetchMembers, 300);
                } else {
                    appendMessage("message", msg.username, msg.content);
                }
            };

            ws.onclose = () => {
                appendMessage("system", "", "连接已断开");
                stopPollingMembers();
            };

            document.getElementById("room-picker").style.display = "none";
            document.getElementById("chat-page").style.display = "flex";
            document.getElementById("room-title").textContent = myRoom;

            startPollingMembers();
        }

        function showError(msg) {
            const errorDiv = document.getElementById("picker-error");
            errorDiv.textContent = msg;
            errorDiv.style.display = "block";
        }

        function leaveRoom() {
            if (ws) ws.close();
            stopPollingMembers();
            document.getElementById("chat-page").style.display = "none";
            document.getElementById("room-picker").style.display = "block";
            document.getElementById("messages").innerHTML = "";
            ws = null;
        }

        function send() {
            const input = document.getElementById("msg");
            const content = input.value.trim();
            if (!content || !ws) return;
            // 修复：带上 msg_type = "message"
            ws.send(JSON.stringify({
                msg_type: "message",
                username: myUsername,
                room: myRoom,
                content: content
            }));
            input.value = "";
        }

        document.getElementById("msg").addEventListener("keypress", (e) => {
            if (e.key === "Enter") send();
        });
    </script>
</body>
</html>
